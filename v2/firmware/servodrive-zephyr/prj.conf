# ServoDrive (Zephyr reference) - application config.

CONFIG_LOG=y

# Peripherals
CONFIG_GPIO=y
CONFIG_PWM=y
CONFIG_ADC=y
CONFIG_I2C=y

# I2C target (slave) support
CONFIG_I2C_TARGET=y

# FPU (DCE math in float); target MCU must have an FPU (e.g. G431).
CONFIG_FPU=y

CONFIG_MAIN_STACK_SIZE=2048
CONFIG_ASSERT=y
