# ElectronBot head firmware (Zephyr) - application config.

# Core
CONFIG_LOG=y
CONFIG_GPIO=y
CONFIG_SPI=y
CONFIG_I2C=y
CONFIG_DMA=y

# FPU (Cortex-M4F)
CONFIG_FPU=y

# USB device stack (legacy stack shown; for usb_device_next swap the symbols).
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_VID=0x1001
CONFIG_USB_DEVICE_PID=0x8023
CONFIG_USB_DEVICE_MANUFACTURER="Pengzhihui"
CONFIG_USB_DEVICE_PRODUCT="ElectronBot@PZH"

# Reasonable heap/stack for the 43232-byte ping-pong buffers (in BSS, not heap).
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=8192

# Helpful while bringing up.
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_ASSERT=y
